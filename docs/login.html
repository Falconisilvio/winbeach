<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <script src="js/theme-init.js"></script>
  <script src="js/lang-init.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Accesso — WinBeach</title>
  <link rel="stylesheet" href="css/page.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100dvh; background: #f4f6fa; }
    .login-card {
      width: min(400px, 92vw);
      background: #fff;
      border-radius: 16px;
      padding: 32px 28px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.08);
    }
    .login-card h1 { font-size: 1.4rem; margin: 12px 0 6px; text-align: center; }
    .login-logo { text-align: center; font-size: 2.5rem; color: #0084ff; }
    .login-sub { text-align: center; color: #666; font-size: 0.9rem; margin-bottom: 24px; }
    .login-error { background: #fff5f5; color: #c53030; padding: 10px 12px; border-radius: 8px; margin-bottom: 16px; display: none; }
    .login-error.show { display: block; }
    .login-card .form-group { margin-bottom: 14px; }
    .login-card label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; }
    .login-card input { width: 100%; padding: 12px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
    .login-card button[type=submit] {
      width: 100%; margin-top: 8px; padding: 14px; background: #0084ff; color: #fff;
      border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; min-height: 48px;
    }
    .login-card button[type=submit]:disabled { opacity: 0.6; }
    .demo-hint { margin-top: 20px; font-size: 0.8rem; color: #888; text-align: center; line-height: 1.5; }
    .back-link { display: block; text-align: center; margin-top: 16px; color: #0084ff; text-decoration: none; font-size: 0.9rem; }
    .login-lang { position: fixed; top: 16px; left: 16px; z-index: 20; }
    .login-theme {
      position: fixed; top: 16px; right: 16px;
      width: 44px; height: 44px; border-radius: 10px;
      border: 1px solid #ddd; background: #fff; color: #1a1a1a;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
  </style>
</head>
<body class="login-page">
  <button type="button" class="login-theme theme-toggle" id="btn-theme-toggle" data-theme-toggle data-i18n-aria="theme.toggle" aria-label="Theme">
    <i class="fa-solid fa-sun" aria-hidden="true"></i>
  </button>
  <div class="login-lang lang-switcher" id="login-lang-switcher">
    <button type="button" class="lang-btn" id="login-lang-btn" aria-haspopup="listbox" aria-expanded="false" data-i18n-aria="nav.language">
      <i class="fa-solid fa-globe" aria-hidden="true"></i>
      <span class="lang-btn-label">IT</span>
      <i class="fa-solid fa-chevron-down lang-chevron" aria-hidden="true"></i>
    </button>
    <div class="lang-dropdown" id="login-lang-dropdown" role="listbox" hidden></div>
  </div>
  <div class="login-card">
    <div class="login-logo"><i class="fa-solid fa-umbrella-beach"></i></div>
    <h1 data-i18n="login.title">Beach Manager</h1>
    <p class="login-sub" data-i18n="login.subtitle">Accedi per modificare prenotazioni, clienti e dati operativi</p>
    <div id="login-error" class="login-error" role="alert"></div>
    <form id="login-form">
      <div class="form-group">
        <label for="username" data-i18n="login.user">Utente</label>
        <input type="text" id="username" name="username" autocomplete="username" required placeholder="admin">
      </div>
      <div class="form-group">
        <label for="password" data-i18n="login.password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required placeholder="••••••">
      </div>
      <button type="submit" id="btn-submit" data-i18n="login.submit">Entra</button>
    </form>
    <p class="demo-hint" data-i18n="login.demo">
      Demo: admin / admin — reception / reception
    </p>
    <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> <span data-i18n="login.readonly">Continua in sola lettura</span></a>
  </div>
  <script type="module" src="js/app-i18n.js"></script>
  <script type="module" src="js/login.js"></script>
  <script type="module">
    import { initThemeUi } from './js/winbeach-theme.js';
    import { initPageI18n } from './js/page-i18n.js';
    initThemeUi();
    initPageI18n();
  </script>
</body>
</html>
