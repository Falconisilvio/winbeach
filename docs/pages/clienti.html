<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    
  <script src="../js/theme-init.js"></script>
<title>Anagrafica Clienti</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #ffffff; color: #333; margin: 0; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f4f6fa; padding-bottom: 15px; margin-bottom: 20px; }
        h2 { margin: 0; color: #222; font-weight: 500; }
        
        /* Pulsanti */
        .btn { background: #2ecc71; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .btn:hover { background: #27ae60; }
        .btn-secondary { background: #95a5a6; }
        .btn-secondary:hover { background: #7f8c8d; }
        
        /* Tabella */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #f2f2f2; }
        th { background-color: #f8f9fa; color: #555; font-weight: 600; }
        .badge { background: #e8f0fe; color: #0b7ef3; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .svuota-archivio { background: transparent; color: #e74c3c; border: none; cursor: pointer; font-size: 13px; margin-top: 15px; text-decoration: underline; }

        /* MODAL DIALOG (Finestra a comparsa) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 999;
        }
        .modal-overlay.open { opacity: 1; pointer-events: auto; }
        
        .modal-box {
            background: white; padding: 25px; border-radius: 10px;
            width: 100%; max-width: 500px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transform: translateY(-20px); transition: transform 0.3s ease;
        }
        .modal-overlay.open .modal-box { transform: translateY(0); }
        
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-header h3 { margin: 0; font-size: 18px; }
        
        /* Form */
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; gap: 5px; }
        .form-group label { font-size: 13px; font-weight: 600; color: #666; }
        .form-group input { padding: 8px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; outline: none; }
        .form-group input:focus { border-color: #2ecc71; }
        .modal-buttons { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <h2><i class="fa-solid fa-users" style="color: #2ecc71; margin-right: 10px;"></i> Registro Clienti</h2>
        <button class="btn" id="open-modal-btn"><i class="fa-solid fa-user-plus"></i> Nuovo Cliente</button>
    </div>
    
    <table>
        <thead>
            <tr>
                <th>Cognome e Nome</th>
                <th>Email</th>
                <th>Telefono</th>
                <th>Indirizzo</th>
                <th>Stato</th>
            </tr>
        </thead>
        <tbody id="clienti-table-body">
            </tbody>
    </table>

    <button class="svuota-archivio" id="clear-storage-btn">Svuota archivio clienti modificati</button>

    <div class="modal-overlay" id="modal-form-cliente">
        <div class="modal-box">
            <div class="modal-header">
                <h3>Inserisci Nuovo Cliente</h3>
                <i class="fa-solid fa-xmark" id="close-modal-x" style="cursor: pointer; color: #999;"></i>
            </div>
            
            <form id="form-nuovo-cliente">
                <div class="form-group">
                    <label for="cognome">Cognome *</label>
                    <input type="text" id="cognome" required placeholder="Es. Rossi">
                </div>
                <div class="form-group">
                    <label for="nome">Nome *</label>
                    <input type="text" id="nome" required placeholder="Es. Mario">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Es. email@esempio.com">
                </div>
                <div class="form-group">
                    <label for="telefono">Telefono</label>
                    <input type="text" id="telefono" placeholder="Es. 333123456">
                </div>
                <div class="form-group">
                    <label for="indirizzo">Indirizzo</label>
                    <input type="text" id="indirizzo" placeholder="Es. Via Roma 10">
                </div>
                
                <div class="modal-buttons">
                    <button type="button" class="btn btn-secondary" id="btn-annulla">Annulla</button>
                    <button type="submit" class="btn">Salva Cliente</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Elementi del DOM
        const modal = document.getElementById('modal-form-cliente');
        const openModalBtn = document.getElementById('open-modal-btn');
        const closeModalX = document.getElementById('close-modal-x');
        const btnAnnulla = document.getElementById('btn-annulla');
        const formCliente = document.getElementById('form-nuovo-cliente');
        const tableBody = document.getElementById('clienti-table-body');
        const clearStorageBtn = document.getElementById('clear-storage-btn');

        // Array che conterrà l'unione dei dati del JSON + quelli aggiunti a mano
        let listaClienti = [];

        // 1. FUNZIONE PER CARICARE I DATI (Prima tenta da localStorage, se vuoto scarica il JSON)
        async function inizializzaDati() {
            const locali = localStorage.getItem('clienti_locali');
            
            if (locali) {
                // Se ci sono già dati salvati dall'utente, usa quelli
                listaClienti = JSON.parse(locali);
                renderTabella();
            } else {
                // Altrimenti, fa una richiesta fetch per leggere il file clienti.json
                try {
                    const response = await fetch('clienti.json');
                    if (!response.ok) throw new Error('Impossibile leggere clienti.json');
                    listaClienti = await response.json();
                    renderTabella();
                } catch (error) {
                    console.error("Errore nel caricamento del JSON:", error);
                    tableBody.innerHTML = `<tr><td colspan="5" style="color: red; text-align: center;">Inserisci un file 'clienti.json' nella stessa cartella o aggiungi un nuovo cliente.</td></tr>`;
                }
            }
        }

        // 2. FUNZIONE PER DISEGNARE LA TABELLA
        function renderTabella() {
            tableBody.innerHTML = '';
            if (listaClienti.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: #999;">Nessun cliente in archivio.</td></tr>`;
                return;
            }

            listaClienti.forEach((cliente) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong>${cliente.cognome} ${cliente.nome}</strong></td>
                    <td>${cliente.email || '-'}</td>
                    <td>${cliente.telefono || '-'}</td>
                    <td>${cliente.indirizzo || '-'}</td>
                    <td><span class="badge">Attivo</span></td>
                `;
                tableBody.appendChild(row);
            });
        }

        // 3. GESTIONE DIALOG (Apri / Chiudi)
        function apriModal() { modal.classList.add('open'); }
        function chiudiModal() { 
            modal.classList.remove('open'); 
            formCliente.reset(); 
        }

        openModalBtn.addEventListener('click', apriModal);
        closeModalX.addEventListener('click', chiudiModal);
        btnAnnulla.addEventListener('click', chiudiModal);
        modal.addEventListener('click', (e) => { if (e.target === modal) chiudiModal(); });

        // 4. SALVATAGGIO NUOVO CLIENTE (Form)
        formCliente.addEventListener('submit', (e) => {
            e.preventDefault();

            const nuovoCliente = {
                cognome: document.getElementById('cognome').value,
                nome: document.getElementById('nome').value,
                email: document.getElementById('email').value,
                telefono: document.getElementById('telefono').value,
                indirizzo: document.getElementById('indirizzo').value
            };

            // Aggiunge il cliente alla lista corrente e salva tutto in localStorage
            listaClienti.push(nuovoCliente);
            localStorage.setItem('clienti_locales', JSON.stringify(listaClienti));

            renderTabella();
            chiudiModal();
        });

        // 5. SVUOTA ARCHIVIO (Ripristina lo stato iniziale cancellando il localStorage)
        clearStorageBtn.addEventListener('click', () => {
            if (confirm('Vuoi resettare le modifiche e ricaricare il file clienti.json iniziale?')) {
                localStorage.removeItem('clienti_locales');
                inizializzaDati();
            }
        });

        // Avvia l'applicazione
        inizializzaDati();
    </script>
</body>
</html>
