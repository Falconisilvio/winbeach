<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Dati Azienda</title>
  <link rel="stylesheet" href="../css/page.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
  <div class="header">
    <h2><i class="fa-solid fa-building" style="color:#636e72"></i> Dati Azienda</h2>
  </div>
  <div class="db-bar"><span><i class="fa-solid fa-database"></i> Base dati</span><div id="db-status" class="db-status idle">…</div></div>
  <form id="azienda-form">
    <div class="form-grid">
      <div class="form-group"><label for="f-ragione-sociale">Ragione sociale</label><input id="f-ragione-sociale" required></div>
      <div class="form-group"><label for="f-piva">P. IVA</label><input id="f-piva"></div>
      <div class="form-group"><label for="f-indirizzo">Indirizzo</label><input id="f-indirizzo"></div>
      <div class="form-group"><label for="f-email">Email</label><input type="email" id="f-email"></div>
      <div class="form-group"><label for="f-telefono">Telefono</label><input id="f-telefono"></div>
      <div class="form-group"><label for="f-stagione">Stagione</label><input id="f-stagione" placeholder="01/06 — 15/09"></div>
    </div>
    <div style="margin-top:16px"><button type="submit" class="btn btn-primary"><i class="fa-solid fa-floppy-disk"></i> Salva</button></div>
  </form>
  <script type="module" src="../js/azienda.js"></script>
</body>
</html>
