<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Sala e Tavoli</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 25px; background: #f4f6fa; margin: 0; }
        h1 { font-size: 26px; color: #2c3e50; margin-bottom: 5px; }
        p { color: #7f8c8d; margin-bottom: 25px; }
        
        .sala-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 20px; }
        .tavolo-card { background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); padding: 25px 15px; text-align: center; cursor: pointer; transition: 0.2s; border: 2px solid transparent; }
        .tavolo-card:hover { transform: translateY(-3px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); border-color: #3498db; }
        
        .tavolo-card i { font-size: 32px; color: #7f8c8d; margin-bottom: 10px; }
        .tavolo-card h3 { margin: 5px 0; color: #2c3e50; }
        
        /* Stati del tavolo */
        .tavolo-card.occupato { border-left: 5px solid #e74c3c; }
        .tavolo-card.occupato i { color: #e74c3c; }
        .tavolo-card.libero { border-left: 5px solid #2ecc71; }
        .tavolo-card.libero i { color: #2ecc71; }
    </style>
</head>
<body>

    <h1>Mappa della Sala</h1>
    <p>Seleziona un tavolo per gestire la comanda o emettere il conto.</p>

    <div class="sala-grid">
        <div class="tavolo-card libero" onclick="selezionaTavolo('Tavolo 1')">
            <i class="fa-solid fa-circle-dot"></i>
            <h3>Tavolo 1</h3>
            <small style="color: #2ecc71;">Libero</small>
        </div>
        <div class="tavolo-card occupato" onclick="selezionaTavolo('Tavolo 2')">
            <i class="fa-solid fa-utensils"></i>
            <h3>Tavolo 2</h3>
            <small style="color: #e74c3c;">In Corso</small>
        </div>
        <div class="tavolo-card occupato" onclick="selezionaTavolo('Tavolo 3')">
            <i class="fa-solid fa-utensils"></i>
            <h3>Tavolo 3</h3>
            <small style="color: #e74c3c;">In Corso</small>
        </div>
        <div class="tavolo-card libero" onclick="selezionaTavolo('Tavolo 4')">
            <i class="fa-solid fa-circle-dot"></i>
            <h3>Tavolo 4</h3>
            <small style="color: #2ecc71;">Libero</small>
        </div>
        <div class="tavolo-card libero" onclick="selezionaTavolo('Terrazza 1')">
            <i class="fa-solid fa-umbrella"></i>
            <h3>Terrazza 1</h3>
            <small style="color: #2ecc71;">Libero</small>
        </div>
    </div>

    <script>
        function selezionaTavolo(nomeTavolo) {
            // Salva il tavolo selezionato nel LocalStorage del browser
            localStorage.setItem('tavoloSelezionato', nomeTavolo);
            
            // Invia una notifica al file padre ristorante.html per spostarsi sul menu cassa
            window.parent.postMessage('apriCassa', '*');
        }
    </script>
</body>
</html>
