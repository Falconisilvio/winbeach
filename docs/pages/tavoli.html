<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <script src="../js/theme-init.js"></script>
  <script src="../js/lang-init.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Sala e Tavoli</title>
  <link rel="stylesheet" href="../css/page.css">
  <link rel="stylesheet" href="../css/ristorante.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body class="tavoli-page">

  <div class="header-sala">
    <h1>Mappa della Sala Ristorante</h1>
    <p>Seleziona un tavolo dall'archivio per aprire la comanda touch nel Punto Vendita.</p>
  </div>

  <div id="sale-container">
    <div class="loading-db" style="text-align: center; padding: 20px; color: var(--wb-text-muted);">
      <i class="fa-solid fa-spinner fa-spin"></i> Caricamento tavoli dall'archivio...
    </div>
  </div>

  <script type="module">
    import { getToken } from '../js/winbeach-db.js';
    import { applyReadOnlyMode, onAuthChange } from '../js/winbeach-auth.js';
    import { $ } from '../js/winbeach-module.js';
    import { loadRistoranteFromDb, getTavoliDivisiPerSale } from '../js/ristorante-db.js';

    function wbT(key) { return (window.__wbT && window.__wbT(key)) || key; }

    async function inizializzaMappa() {
      // Carica i dati reali centralizzati dal DB
      const dati = await loadRistoranteFromDb();
      if (!dati) {
        document.getElementById('sale-container').innerHTML = '<p style="color:red; text-align:center;">Errore nel caricamento dell\'archivio tavoli.</p>';
        return;
      }

      renderizzaSaleETavoli();
    }

    function renderizzaSaleETavoli() {
      const container = document.getElementById('sale-container');
      container.innerHTML = '';

      const saleConTavoli = getTavoliDivisiPerSale();

      saleConTavoli.forEach(sala => {
        // Icone dinamiche in base al nome della sala
        let iconaConversione = 'fa-house-user';
        if (sala.nome.toLowerCase().includes('terrazza')) iconaConversione = 'fa-cloud-sun';
        if (sala.nome.toLowerCase().includes('giardino')) iconaConversione = 'fa-tree';
        if (sala.nome.toLowerCase().includes('gazebo') || sala.nome.toLowerCase().includes('spiaggia')) iconaConversione = 'fa-umbrella-beach';

        let salaHTML = `
          <div class="zona-titolo"><i class="fa-solid ${iconaConversione}"></i> ${sala.nome}</div>
          <div class="sala-grid">`;

        sala.tavoli.forEach(tavolo => {
          const isOccupato = tavolo.stato === 'occupato';
          const statoClasse = isOccupato ? 'occupato' : '';
          const statoTesto = isOccupato ? wbT('tavoli.busy') : wbT('tavoli.free');
          const iconaTavolo = isOccupato ? 'fa-utensils' : 'fa-circle-dot';

          salaHTML += `
            <div class="tavolo-card ${statoClasse}" data-id="${tavolo.id}">
              <i class="fa-solid ${iconaTavolo}"></i>
              <h3>Tavolo ${tavolo.numero}</h3>
              <small>${statoTesto}</small>
            </div>`;
        });

        salaHTML += `</div>`;
        container.innerHTML += salaHTML;
      });

      // Aggancia l'evento click reale su ogni tavolo generato
      document.querySelectorAll('.tavolo-card').forEach(card => {
        card.addEventListener('click', function() {
          const idTavolo = this.getAttribute('data-id');
          // Salva l'ID del tavolo selezionato anziché solo il nome testo
          localStorage.setItem('tavoloSelezionatoId', idTavolo);
          
          // Reindirizza alla cassa ristorante (pointsale) senza causare errori 404
          window.parent.postMessage({ comando: 'cambiaPagina', target: 'pointsale' }, '*');
        });
      });
    }

    window.addEventListener('winbeach-lang-change', () => {
      renderizzaSaleETavoli();
    });

    window.addEventListener('load', inizializzaMappa);
  </script>
</body>
</html>
