<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Sala e Tavoli</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 25px; background: #ffffff; color: #333; margin: 0; }
        h1 { font-size: 24px; color: #2c3e50; margin-bottom: 5px; font-weight: 500; }
        p { color: #7f8c8d; margin-bottom: 25px; font-size: 14px; }
        
        .sala-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 20px; }
        .tavolo-card { background: #fafbfc; border-radius: 12px; border: 1px solid #e0e0e0; padding: 25px 15px; text-align: center; cursor: pointer; transition: 0.2s; border-left: 5px solid #2ecc71; }
        .tavolo-card:hover { transform: translateY(-3px); box-shadow: 0 6px 15px rgba(0,0,0,0.05); border-color: #0b7ef3; }
        
        .tavolo-card i { font-size: 32px; color: #2ecc71; margin-bottom: 10px; }
        .tavolo-card h3 { margin: 5px 0; color: #2c3e50; font-size: 16px; }
        
        .tavolo-card.occupato { border-left-color: #e74c3c; }
        .tavolo-card.occupato i { color: #e74c3c; }
    </style>
</head>
<body>

    <h1>Mappa della Sala Ristorante</h1>
    <p>Seleziona un tavolo per gestire l'ordine nel Punto Vendita.</p>

    <div class="sala-grid">
        <div class="tavolo-card" onclick="selezionaTavolo('Tavolo 1')">
            <i class="fa-solid fa-circle-dot"></i>
            <h3>Tavolo 1</h3>
            <small style="color: #2ecc71;">Libero</small>
        </div>
        <div class="tavolo-card occupato" onclick="selezionaTavolo('Tavolo 2')">
            <i class="fa-solid fa-utensils"></i>
            <h3>Tavolo 2</h3>
            <small style="color: #e74c3c;">In corso</small>
        </div>
        <div class="tavolo-card occupato" onclick="selezionaTavolo('Tavolo 3')">
            <i class="fa-solid fa-utensils"></i>
            <h3>Tavolo 3</h3>
            <small style="color: #e74c3c;">In corso</small>
        </div>
        <div class="tavolo-card" onclick="selezionaTavolo('Tavolo 4')">
            <i class="fa-solid fa-circle-dot"></i>
            <h3>Tavolo 4</h3>
            <small style="color: #2ecc71;">Libero</small>
        </div>
    </div>

    <script>
        function selezionaTavolo(nomeTavolo) {
            localStorage.setItem('tavoloSelezionato', nomeTavolo);
            // Invia il comando di cambio pagina puntando a pointsale
            window.parent.postMessage({ comando: 'cambiaPagina', target: 'point' }, '*');
        }
    </script>
</body>
</html>
