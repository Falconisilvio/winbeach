<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <script src="../js/theme-init.js"></script>
  <script src="../js/lang-init.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Sala e Tavoli</title>
  <link rel="stylesheet" href="../css/page.css">
  <link rel="stylesheet" href="../css/ristorante.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body class="tavoli-page">

  <div class="header-sala">
    <h1>Mappa della Sala Ristorante</h1>
    <p>Seleziona uno dei 50 tavoli disponibili per aprire la comanda touch nel Punto Vendita.</p>
  </div>

  <div class="zona-titolo"><i class="fa-solid fa-house-user"></i> Sala Interna</div>
  <div class="sala-grid" id="zona-interna"></div>

  <div class="zona-titolo"><i class="fa-solid fa-cloud-sun"></i> Terrazza Vista Mare</div>
  <div class="sala-grid" id="zona-terrazza"></div>

  <div class="zona-titolo"><i class="fa-solid fa-tree"></i> Giardino</div>
  <div class="sala-grid" id="zona-giardino"></div>

  <div class="zona-titolo"><i class="fa-solid fa-umbrella-beach"></i> Gazebo Beach</div>
  <div class="sala-grid" id="zona-gazebo"></div>

  <script>
    function wbT(key) { return (window.__wbT && window.__wbT(key)) || key; }

    function generaMappaTavoli() {
      const interna = document.getElementById('zona-interna');
      const terrazza = document.getElementById('zona-terrazza');
      const giardino = document.getElementById('zona-giardino');
      const gazebo = document.getElementById('zona-gazebo');
      [interna, terrazza, giardino, gazebo].forEach((z) => { if (z) z.innerHTML = ''; });

      for (let i = 1; i <= 50; i++) {
        const isOccupato = Math.random() < 0.35;
        const statoClasse = isOccupato ? 'occupato' : '';
        const statoTesto = isOccupato ? wbT('tavoli.busy') : wbT('tavoli.free');
        const icona = isOccupato ? 'fa-utensils' : 'fa-circle-dot';
        const nome = `${wbT('tavoli.table')} ${i}`;

        const tavoloHTML = `
          <div class="tavolo-card ${statoClasse}" onclick="selezionaTavolo('${nome.replace(/'/g, "\\'")}')">
            <i class="fa-solid ${icona}"></i>
            <h3>${nome}</h3>
            <small>${statoTesto}</small>
          </div>`;

        if (i <= 20) interna.innerHTML += tavoloHTML;
        else if (i <= 35) terrazza.innerHTML += tavoloHTML;
        else if (i <= 45) giardino.innerHTML += tavoloHTML;
        else gazebo.innerHTML += tavoloHTML;
      }
    }

    function selezionaTavolo(nomeTavolo) {
      localStorage.setItem('tavoloSelezionato', nomeTavolo);
      window.parent.postMessage({ comando: 'cambiaPagina', target: 'pointsale' }, '*');
    }

    window.addEventListener('winbeach-lang-change', () => { generaMappaTavoli(); import('../js/page-i18n.js').then((m) => m.applyPageI18n()); });
    window.addEventListener('message', (e) => {
      if (e.data?.type === 'winbeach-lang-change') {
        generaMappaTavoli();
        import('../js/page-i18n.js').then((m) => m.applyPageI18n());
      }
    });
    window.onload = generaMappaTavoli;
  </script>
  <script type="module" src="../js/app-i18n.js"></script>
  <script type="module">
    import { initPageI18n } from '../js/page-i18n.js';
    initPageI18n();
  </script>
</body>
</html>
