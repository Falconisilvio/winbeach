<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <script src="../js/theme-init.js"></script>
  <script src="../js/lang-init.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Punto Vendita Ristorante</title>
  <link rel="stylesheet" href="../css/page.css">
  <link rel="stylesheet" href="../css/ristorante.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body class="pointsale-page">

  <div class="cassa-header">
    <h2><i class="fa-solid fa-cash-register" style="color: var(--wb-accent); margin-right: 8px;"></i> Cassa Ristorante (Point of Sale)</h2>
    <div class="tavolo-badge" id="lbl-tavolo">Caricamento...</div>
  </div>

  <div class="main-container">
    <div class="prodotti-section">
      <div class="categorie-bar" id="bar-categorie">
        </div>
      <div class="tastiera-articoli" id="grid-prodotti"></div>
    </div>

    <div class="comanda-section">
      <div class="comanda-title"><i class="fa-solid fa-list-check"></i> Righe Comanda Attiva</div>
      <div class="xbrowse-container">
        <table class="xbrowse">
          <thead>
            <tr>
              <th>Articolo</th>
              <th style="text-align: center; width: 50px;">Q.tà</th>
              <th style="text-align: right; width: 80px;">Totale</th>
              <th style="text-align: center; width: 40px;"></th>
            </tr>
          </thead>
          <tbody id="xbrowse-body"></tbody>
        </table>
      </div>
      <div class="comanda-totali">
        <div class="tot-row">
          <span>TOTALE CONTO:</span>
          <span id="txt-totale">0.00 €</span>
        </div>
        <button type="button" class="btn-invia" id="btn-salva-comanda"><i class="fa-solid fa-floppy-disk"></i> Salva e Stampa Comanda</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { loadRistoranteFromDb, selezionaTavolo, saveTavoloToDb } from '../js/ristorante-db.js';

    let tavoloCorrente = null;
    let prodottiGlobali = [];
    let carrello = [];

    function wbT(key) { return (window.__wbT && window.__wbT(key)) || key; }

    window.addEventListener('load', async function () {
      // 1. Inizializza i dati dal database centralizzato
      const dbData = await loadRistoranteFromDb();
      if (!dbData) return;

      prodottiGlobali = dbData.prodotti;

      // 2. Recupera il tavolo selezionato
      const idTavolo = localStorage.getItem('tavoloSelezionatoId');
      tavoloCorrente = selezionaTavolo(idTavolo);

      if (tavoloCorrente) {
        document.getElementById('lbl-tavolo').innerText = `Tavolo ${tavoloCorrente.numero}`;
        
        // 3. Se il tavolo ha già una comanda salvata, la carica nel carrello grafico
        carrello = tavoloCorrente.comanda.map(item => {
          const prodInfo = prodottiGlobali.find(p => p.id === item.prodId);
          return {
            id: item.prodId,
            nome: prodInfo ? prodInfo.nome : 'Prodotto Sconosciuto',
            prezzo: prodInfo ? prodInfo.prezzo : 0,
            qta: item.qta
          };
        });
        aggiornaXBrowse();
      } else {
        document.getElementById('lbl-tavolo').innerText = "Nessun Tavolo";
      }

      // 4. Renderizza la barra delle categorie reali provenienti dall'archivio
      renderizzaCategorie(dbData.categorie);
    });

    function renderizzaCategorie(categorie) {
      const catBar = document.getElementById('bar-categorie');
      catBar.innerHTML = '';
      
      categorie.forEach((cat, idx) => {
        const activeClass = idx === 0 ? 'active' : '';
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = `cat-btn ${activeClass}`;
        btn.innerText = cat.nome;
        btn.addEventListener('click', function() {
          document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
          this.classList.add('active');
          caricaArticoliPerCategoria(cat.id);
        });
        catBar.appendChild(btn);
      });

      if (categorie.length > 0) {
        caricaArticoliPerCategoria(categorie[0].id);
      }
    }

    function caricaArticoliPerCategoria(categoriaId) {
      const grid = document.getElementById('grid-prodotti');
      grid.innerHTML = '';
      
      const filtrati = prodottiGlobali.filter(p => p.categoriaId === categoriaId);
      
      filtrati.forEach(p => {
        const card = document.createElement('div');
        card.className = 'articolo-card';
        card.innerHTML = `
          <div class="name">${p.nome}</div>
          <div class="price">${p.prezzo.toFixed(2)} €</div>`;
        card.addEventListener('click', () => aggiungiProdotto(p));
        grid.appendChild(card);
      });
    }

    function aggiungiProdotto(prodotto) {
      const item = carrello.find(i => i.id === prodotto.id);
      if (item) {
        item.qta++;
      } else {
        carrello.push({ id: prodotto.id, nome: prodotto.nome, qta: 1, prezzo: prodotto.prezzo });
      }
      aggiornaXBrowse();
    }

    function aggiornaXBrowse() {
      const tbody = document.getElementById('xbrowse-body');
      tbody.innerHTML = '';
      let totaleConto = 0;

      carrello.forEach((item, idx) => {
        const rigaTot = item.qta * item.prezzo;
        totaleConto += rigaTot;
        
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><strong>${item.nome}</strong></td>
          <td style="text-align:center;">${item.qta}</td>
          <td style="text-align:right;">${rigaTot.toFixed(2)} €</td>
          <td style="text-align:center;"></td>`;
          
        const btnDel = document.createElement('button');
        btnDel.type = 'button';
        btnDel.className = 'btn-del';
        btnDel.innerHTML = '<i class="fa-regular fa-trash-can"></i>';
        btnDel.addEventListener('click', () => {
          carrello.splice(idx, 1);
          aggiornaXBrowse();
        });
        
        tr.children[3].appendChild(btnDel);
        tbody.appendChild(tr);
      });
      document.getElementById('txt-totale').innerText = totaleConto.toFixed(2) + ' €';
    }

    // Salvataggio sul modulo ristorante-db
    document.getElementById('btn-salva-comanda').addEventListener('click', async function() {
      if (!tavoloCorrente) return alert("Nessun tavolo selezionato.");
      
      // Converte il carrello grafico nel formato compatto del database (.comanda)
      tavoloCorrente.comanda = carrello.map(item => ({
        prodId: item.id,
        qta: item.qta
      }));
      
      if (carrello.length === 0) {
        tavoloCorrente.stato = 'libero';
      }

      const salvato = await saveTavoloToDb(tavoloCorrente);
      if (salvato) {
        alert(wbT('pos.sent') || "Comanda inviata alla cucina e salvata con successo!");
        // Ritorna alla visualizzazione della mappa dei tavoli
        window.parent.postMessage({ comando: 'cambiaPagina', target: 'tavoli' }, '*');
      }
    });
  </script>
</body>
</html>
</html>
