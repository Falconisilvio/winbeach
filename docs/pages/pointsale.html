<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <script src="../js/theme-init.js"></script>
  <script src="../js/lang-init.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Punto Vendita Ristorante</title>
  <link rel="stylesheet" href="../css/ristorante.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body class="pointsale-page">

  <div class="cassa-header">
    <h2><i class="fa-solid fa-cash-register" style="color: var(--wb-accent); margin-right: 8px;"></i> Cassa Ristorante (Point of Sale)</h2>
    <div class="tavolo-badge" id="lbl-tavolo">Caricamento...</div>
  </div>

  <div class="main-container">
    <div class="prodotti-section">
      <div class="categorie-bar">
        <button type="button" class="cat-btn active" onclick="cambiaCategoria('Ristorante', this)">Ristorante</button>
        <button type="button" class="cat-btn" onclick="cambiaCategoria('Bevande', this)">Bevande</button>
        <button type="button" class="cat-btn" onclick="cambiaCategoria('Bar', this)">Bar & Caffetteria</button>
      </div>
      <div class="tastiera-articoli" id="grid-prodotti"></div>
    </div>

    <div class="comanda-section">
      <div class="comanda-title"><i class="fa-solid fa-list-check"></i> Righe Comanda Attiva</div>
      <div class="xbrowse-container">
        <table class="xbrowse">
          <thead>
            <tr>
              <th>Articolo</th>
              <th style="text-align: center; width: 50px;">Q.tà</th>
              <th style="text-align: right; width: 80px;">Totale</th>
              <th style="text-align: center; width: 40px;"></th>
            </tr>
          </thead>
          <tbody id="xbrowse-body"></tbody>
        </table>
      </div>
      <div class="comanda-totali">
        <div class="tot-row">
          <span>TOTALE CONTO:</span>
          <span id="txt-totale">0.00 €</span>
        </div>
        <button type="button" class="btn-invia" onclick="inviaComanda()"><i class="fa-solid fa-print"></i> Stampa Comanda Cucina</button>
      </div>
    </div>
  </div>

  <script>
    const menuDati = {
      Ristorante: [
        { nome: 'Spaghetti Vongole', prezzo: 14.00 },
        { nome: 'Risotto Marinara', prezzo: 15.00 },
        { nome: 'Frittura Pesce Mista', prezzo: 18.00 },
      ],
      Bevande: [
        { nome: 'Acqua Minerale 1L', prezzo: 2.50 },
        { nome: 'Coca Cola Lattina', prezzo: 3.50 },
        { nome: 'Vino Bianco Calice', prezzo: 4.00 },
      ],
      Bar: [
        { nome: 'Caffè Espresso', prezzo: 1.50 },
        { nome: 'Amaro della Casa', prezzo: 3.50 },
      ],
    };

    let carrello = [];

    window.addEventListener('load', function () {
      const t = localStorage.getItem('tavoloSelezionato') || 'Vendita al Banco';
      document.getElementById('lbl-tavolo').innerText = t;
      caricaArticoli('Ristorante');
    });

    function cambiaCategoria(cat, btn) {
      document.querySelectorAll('.cat-btn').forEach((b) => b.classList.remove('active'));
      btn.classList.add('active');
      caricaArticoli(cat);
    }

    function caricaArticoli(cat) {
      const grid = document.getElementById('grid-prodotti');
      grid.innerHTML = '';
      menuDati[cat].forEach((p) => {
        grid.innerHTML += `
          <div class="articolo-card" onclick="aggiungiProdotto('${p.nome}', ${p.prezzo})">
            <div class="name">${p.nome}</div>
            <div class="price">${p.prezzo.toFixed(2)} €</div>
          </div>`;
      });
    }

    function aggiungiProdotto(nome, prezzo) {
      const item = carrello.find((i) => i.nome === nome);
      if (item) item.qta++;
      else carrello.push({ nome, qta: 1, prezzo });
      aggiornaXBrowse();
    }

    function rimuoviProdotto(idx) {
      carrello.splice(idx, 1);
      aggiornaXBrowse();
    }

    function aggiornaXBrowse() {
      const tbody = document.getElementById('xbrowse-body');
      tbody.innerHTML = '';
      let totaleConto = 0;

      carrello.forEach((item, idx) => {
        const rigaTot = item.qta * item.prezzo;
        totaleConto += rigaTot;
        tbody.innerHTML += `
          <tr>
            <td><strong>${item.nome}</strong></td>
            <td style="text-align:center;">${item.qta}</td>
            <td style="text-align:right;">${rigaTot.toFixed(2)} €</td>
            <td style="text-align:center;"><button type="button" class="btn-del" onclick="rimuoviProdotto(${idx})"><i class="fa-regular fa-trash-can"></i></button></td>
          </tr>`;
      });
      document.getElementById('txt-totale').innerText = totaleConto.toFixed(2) + ' €';
    }

    function inviaComanda() {
      if (carrello.length === 0) return alert('Comanda vuota!');
      alert('Comanda inviata in Cucina!');
      carrello = [];
      aggiornaXBrowse();
    }
  </script>
</body>
</html>
