<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Punto Vendita Ristorante</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #ffffff; padding: 20px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .cassa-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f4f6fa; padding-bottom: 15px; margin-bottom: 15px; }
        .tavolo-badge { background: #0b7ef3; color: white; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 13px; }

        .main-container { display: flex; flex: 1; gap: 20px; overflow: hidden; }

        /* SINISTRA: PRODOTTI E CATEGORIE */
        .prodotti-section { flex: 1.3; display: flex; flex-direction: column; gap: 15px; }
        .categorie-bar { display: flex; gap: 10px; }
        .cat-btn { background: #f8f9fa; border: 1px solid #dcdde1; padding: 10px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px; }
        .cat-btn.active { background: #0b7ef3; color: white; border-color: #0b7ef3; }

        .tastiera-articoli { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; overflow-y: auto; flex: 1; padding-right: 5px; }
        .articolo-card { background: #fcfcfc; border: 1px solid #e0e0e0; border-radius: 8px; padding: 15px 10px; text-align: center; cursor: pointer; display: flex; flex-direction: column; justify-content: space-between; height: 95px; transition: 0.15s; }
        .articolo-card:hover { border-color: #0b7ef3; background: #f4f9ff; transform: translateY(-2px); }
        .articolo-card .name { font-size: 13px; font-weight: 500; color: #333; }
        .articolo-card .price { font-weight: bold; color: #2ecc71; font-size: 14px; }

        /* DESTRA: XBROWSE COMANDA */
        .comanda-section { flex: 1; border: 1px solid #e0e0e0; border-radius: 10px; display: flex; flex-direction: column; overflow: hidden; background: #fafbfc; }
        .comanda-title { background: #f1f3f5; padding: 12px; font-size: 14px; font-weight: bold; color: #2c3e50; border-bottom: 1px solid #e0e0e0; }
        
        .xbrowse-container { flex: 1; overflow-y: auto; background: white; }
        .xbrowse { width: 100%; border-collapse: collapse; }
        .xbrowse th, .xbrowse td { padding: 10px 12px; font-size: 13px; text-align: left; border-bottom: 1px solid #f2f2f2; }
        .xbrowse th { background: #f8f9fa; color: #7f8c8d; font-weight: 600; text-transform: uppercase; font-size: 11px; }
        .xbrowse td .btn-del { border: none; background: transparent; color: #e74c3c; cursor: pointer; font-size: 14px; }

        .comanda-totali { padding: 15px; border-top: 1px solid #e0e0e0; background: #f1f3f5; }
        .tot-row { display: flex; justify-content: space-between; font-size: 18px; font-weight: bold; margin-bottom: 12px; color: #2c3e50; }
        .btn-invia { width: 100%; padding: 12px; border: none; border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer; color: white; background: #2ecc71; display: flex; justify-content: center; align-items: center; gap: 8px; }
    </style>
</head>
<body>

    <div class="cassa-header">
        <h2 style="font-size: 20px; font-weight: 500;"><i class="fa-solid fa-cash-register" style="color: #0b7ef3; margin-right: 8px;"></i> Cassa Ristorante (Point of Sale)</h2>
        <div class="tavolo-badge" id="lbl-tavolo">Caricamento...</div>
    </div>

    <div class="main-container">
        <div class="prodotti-section">
            <div class="categorie-bar">
                <button class="cat-btn active" onclick="cambiaCategoria('Ristorante', this)">Ristorante</button>
                <button class="cat-btn" onclick="cambiaCategoria('Bevande', this)">Bevande</button>
                <button class="cat-btn" onclick="cambiaCategoria('Bar', this)">Bar & Caffetteria</button>
            </div>
            <div class="tastiera-articoli" id="grid-prodotti"></div>
        </div>

        <div class="comanda-section">
            <div class="comanda-title"><i class="fa-solid fa-list-check"></i> Righe Comanda Attiva</div>
            <div class="xbrowse-container">
                <table class="xbrowse">
                    <thead>
                        <tr>
                            <th>Articolo</th>
                            <th style="text-align: center; width: 50px;">Q.tà</th>
                            <th style="text-align: right; width: 80px;">Totale</th>
                            <th style="text-align: center; width: 40px;"></th>
                        </tr>
                    </thead>
                    <tbody id="xbrowse-body"></tbody>
                </table>
            </div>
            <div class="comanda-totali">
                <div class="tot-row">
                    <span>TOTALE CONTO:</span>
                    <span id="txt-totale">0.00 €</span>
                </div>
                <button class="btn-invia" onclick="inviaComanda()"><i class="fa-solid fa-print"></i> Stampa Comanda Cucina</button>
            </div>
        </div>
    </div>

    <script>
        const menuDati = {
            'Ristorante': [
                { nome: 'Spaghetti Vongole', prezzo: 14.00 },
                { nome: 'Risotto Marinara', prezzo: 15.00 },
                { nome: 'Frittura Pesce Mista', prezzo: 18.00 }
            ],
            'Bevande': [
                { nome: 'Acqua Minerale 1L', prezzo: 2.50 },
                { nome: 'Coca Cola Lattina', prezzo: 3.50 },
                { nome: 'Vino Bianco Calice', prezzo: 4.00 }
            ],
            'Bar': [
                { nome: 'Caffè Espresso', prezzo: 1.50 },
                { nome: 'Amaro della Casa', prezzo: 3.50 }
            ]
        };

        let carrello = [];

        window.addEventListener('load', function() {
            const t = localStorage.getItem('tavoloSelezionato') || 'Vendita al Banco';
            document.getElementById('lbl-tavolo').innerText = t;
            caricaArticoli('Ristorante');
        });

        function cambiaCategoria(cat, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            caricaArticoli(cat);
        }

        function caricaArticoli(cat) {
            const grid = document.getElementById('grid-prodotti');
            grid.innerHTML = '';
            menuDati[cat].forEach(p => {
                grid.innerHTML += `
                    <div class="articolo-card" onclick="aggiungiProdotto('${p.nome}', ${p.prezzo})">
                        <div class="name">${p.nome}</div>
                        <div class="price">${p.prezzo.toFixed(2)} €</div>
                    </div>`;
            });
        }

        function aggiungiProdotto(nome, prezzo) {
            let item = carrello.find(i => i.nome === nome);
            if(item) { item.qta++; } 
            else { carrello.push({ nome: nome, qta: 1, prezzo: prezzo }); }
            aggiornaXBrowse();
        }

        function rimuoviProdotto(idx) {
            carrello.splice(idx, 1);
            aggiornaXBrowse();
        }

        function aggiornaXBrowse() {
            const tbody = document.getElementById('xbrowse-body');
            tbody.innerHTML = '';
            let totaleConto = 0;

            carrello.forEach((item, idx) => {
                let rigaTot = item.qta * item.prezzo;
                totaleConto += rigaTot;
                tbody.innerHTML += `
                    <tr>
                        <td><strong>${item.nome}</strong></td>
                        <td style="text-align:center;">${item.qta}</td>
                        <td style="text-align:right;">${rigaTot.toFixed(2)} €</td>
                        <td style="text-align:center;"><button class="btn-del" onclick="rimuoviProdotto(${idx})"><i class="fa-regular fa-trash-can"></i></button></td>
                    </tr>`;
            });
            document.getElementById('txt-totale').innerText = totaleConto.toFixed(2) + ' €';
        }

        function inviaComanda() {
            if(carrello.length === 0) return alert("Comanda vuota!");
            alert("Comanda inviata in Cucina!");
            carrello = [];
            aggiornaXBrowse();
        }
    </script>
</body>
</html>
