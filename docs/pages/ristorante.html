<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <script src="../js/theme-init.js"></script>
  <script src="../js/lang-init.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Beach Restaurant Manager</title>
  <link rel="stylesheet" href="../css/ristorante.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body class="ristorante-shell">

  <nav class="sidebar-ristorante">
    <div class="brand">
      <i class="fa-solid fa-utensils"></i>
      <span>Ristorante Beach</span>
    </div>
    <ul class="menu-list">
      <li class="active" onclick="cambiaVista('tavoli', this)">
        <i class="fa-solid fa-table-cells"></i> Sala & Tavoli
      </li>
      <li onclick="cambiaVista('pointsale', this)">
        <i class="fa-solid fa-cash-register"></i> Cassa & Comande
      </li>
    </ul>
  </nav>

  <iframe src="tavoli.html" id="ristorante-frame" class="content-area" title="Ristorante"></iframe>

  <script>
    function cambiaVista(pagina, elemento) {
      document.querySelectorAll('.menu-list li').forEach((li) => li.classList.remove('active'));
      elemento.classList.add('active');
      document.getElementById('ristorante-frame').src = pagina + '.html';
    }

    window.addEventListener('message', function (event) {
      if (event.data === 'apriCassa') {
        const voceCassa = document.querySelectorAll('.menu-list li')[1];
        cambiaVista('pointsale', voceCassa);
      }
    });
  </script>
</body>
</html>
