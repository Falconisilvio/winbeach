<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  
  <script src="../js/theme-init.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Planner</title>
  <link rel="stylesheet" href="../css/page.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
  <div class="header">
    <h2><i class="fa-solid fa-list" style="color:#6c5ce7"></i> Planner</h2>
    <div class="toolbar">
      <button type="button" class="btn btn-secondary" id="btn-reload"><i class="fa-solid fa-rotate"></i> Ricarica</button>
      <button type="button" class="btn btn-primary" id="btn-nuovo"><i class="fa-solid fa-plus"></i> Nuovo</button>
    </div>
  </div>
  <div class="db-bar"><span><i class="fa-solid fa-database"></i> Base dati</span><div id="db-status" class="db-status idle">…</div></div>
  <div class="filters"><input type="search" id="search-input" placeholder="Cerca…"></div>
  <div class="table-scroll"><table><thead><tr><th>Data</th><th>Attività</th><th>Stato</th><th>Assegnato</th><th>Azioni</th></tr></thead><tbody id="data-tbody"></tbody></table></div>
  <div id="empty-state" class="empty-state" style="display:none"><p>Nessun record.</p></div>
  <div class="modal-overlay" id="data-modal">
    <div class="modal">
      <div class="modal-header"><h3 id="modal-title">Nuovo</h3><button type="button" class="modal-close" id="modal-close">&times;</button></div>
      <form id="data-form"><div class="modal-body"><div class="form-grid"><div class="form-group"><label for="f-data">Data</label><input type="text" id="f-data"></div>
            <div class="form-group"><label for="f-titolo">Titolo *</label><input type="text" id="f-titolo"></div>
            <div class="form-group"><label for="f-stato">Stato</label><input type="text" id="f-stato"></div>
            <div class="form-group"><label for="f-assegnato">Assegnato</label><input type="text" id="f-assegnato"></div>
            <div class="form-group" style="grid-column:1/-1"><label for="f-note">Note</label><input type="text" id="f-note"></div></div></div>
        <div class="modal-footer"><button type="button" class="btn btn-secondary" id="btn-cancel">Annulla</button><button type="submit" class="btn btn-primary" id="btn-save">Salva</button></div>
      </form>
    </div>
  </div>
  <script type="module" src="../js/planner.js"></script>
</body></html>
