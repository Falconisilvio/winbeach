<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <script src="../js/theme-init.js"></script>
  <script src="../js/lang-init.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Configurazione Ristorante</title>
  <link rel="stylesheet" href="../css/page.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <style>
    .config-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; }
    .config-card { background: var(--wb-bg-card, #fff); border-radius: 8px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: flex; flex-direction: column; justify-content: space-between; }
    .config-card h2 { margin-top: 0; border-bottom: 2px solid var(--wb-accent, #0084FF); padding-bottom: 8px; font-size: 1.2rem; color: var(--wb-text); }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem; }
    .form-group input, .form-group select { width: 100%; padding: 8px; border: 1px solid var(--wb-border, #ccc); border-radius: 4px; background: var(--wb-bg-input, #fff); color: var(--wb-text); box-sizing: border-box; }
    .btn-save { background: var(--wb-accent, #0084FF); color: #fff; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; }
    .btn-save:hover { opacity: 0.9; }
    .data-list { margin-top: 15px; max-height: 180px; overflow-y: auto; border: 1px solid var(--wb-border, #eee); border-radius: 4px; padding: 0; list-style: none; flex-grow: 1; }
    .data-list li { padding: 8px 12px; border-bottom: 1px solid var(--wb-border, #eee); display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; background: var(--wb-bg-item, #f9f9f9); margin-bottom: 4px; border-radius: 4px; color: #000; }
    .data-list li:last-child { border-bottom: none; margin-bottom: 0; }
    .btn-del-item { background: transparent; border: none; color: #ff4d4d; cursor: pointer; padding: 4px 8px; font-size: 1rem; }
    .btn-del-item:hover { color: #cc0000; }
    @media (max-width: 768px) { .config-container { grid-template-columns: 1fr; } }
  </style>
</head>
<body class="config-ristorante-page">

  <div class="page-header" style="padding: 20px 20px 0 20px;">
    <h1><i class="fa-solid fa-gears"></i> Pannello Configurazione Ristorante & Bar</h1>
    <p>Gestisci l'archivio delle sale, dei tavoli, delle categorie del menu e dei singoli prodotti.</p>
  </div>

  <div class="config-container">
    
    <div class="config-card">
      <div>
        <h2><i class="fa-solid fa-house-user"></i> 1. Gestione Sale / Zone</h2>
        <form id="form-sala">
          <div class="form-group">
            <label for="nome-sala">Nome Nuova Sala:</label>
            <input type="text" id="nome-sala" placeholder="Es: Terrazza Mare, Sala Interna..." required>
          </div>
          <button type="submit" class="btn-save"><i class="fa-solid fa-plus"></i> Aggiungi Sala</button>
        </form>
      </div>
      <ul class="data-list" id="lista-sale"></ul>
    </div>

    <div class="config-card">
      <div>
        <h2><i class="fa-solid fa-circle-dot"></i> 2. Inserimento Tavoli</h2>
        <form id="form-tavolo">
          <div class="form-group">
            <label for="select-sala">Seleziona Sala:</label>
            <select id="select-sala" required><option value="">Caricamento sale...</option></select>
          </div>
          <div class="form-group">
            <label for="numero-tavolo">Numero o Nome Tavolo:</label>
            <input type="text" id="numero-tavolo" placeholder="Es: 1, 14, Privè..." required>
          </div>
          <button type="submit" class="btn-save"><i class="fa-solid fa-plus"></i> Aggiungi Tavolo</button>
        </form>
      </div>
      <ul class="data-list" id="lista-tavoli"></ul>
    </div>

    <div class="config-card">
      <div>
        <h2><i class="fa-solid fa-tags"></i> 3. Categorie Menu</h2>
        <form id="form-categoria">
          <div class="form-group">
            <label for="nome-categoria">Nome Categoria:</label>
            <input type="text" id="nome-categoria" placeholder="Es: Antipasti, Pizze, Primi, Bevande..." required>
          </div>
          <button type="submit" class="btn-save"><i class="fa-solid fa-plus"></i> Aggiungi Categoria</button>
        </form>
      </div>
      <ul class="data-list" id="lista-categorie"></ul>
    </div>

    <div class="config-card">
      <div>
        <h2><i class="fa-solid fa-utensils"></i> 4. Prodotti e Listino Piatti</h2>
        <form id="form-prodotto">
          <div class="form-group">
            <label for="select-categoria">Categoria Prodotto:</label>
            <select id="select-categoria" required><option value="">Caricamento categorie...</option></select>
          </div>
          <div class="form-group">
            <label for="nome-prodotto">Nome Piatto / Articolo:</label>
            <input type="text" id="nome-prodotto" placeholder="Es: Margherita, Spaghetti..." required>
          </div>
          <div class="form-group">
            <label for="prezzo-prodotto">Prezzo di Vendita (€):</label>
            <input type="number" id="prezzo-prodotto" step="0.01" placeholder="Es: 6.50" required>
          </div>
          <button type="submit" class="btn-save"><i class="fa-solid fa-plus"></i> Aggiungi Prodotto al Listino</button>
        </form>
      </div>
      <ul class="data-list" id="lista-prodotti"></ul>
    </div>

  </div>

  <script>
    let dbRistorante = { sale: [], tavoli: [], categorie: [], prodotti: [] };
    const LOCAL_STORAGE_KEY = 'winbeach_archivio_ristorante';

    function inizializzaDatabaseLocale() {
      const datiSalvati = localStorage.getItem(LOCAL_STORAGE_KEY);
      if (datiSalvati !== null) {
        dbRistorante = JSON.parse(datiSalvati);
        if(!dbRistorante.sale) dbRistorante.sale = [];
        if(!dbRistorante.tavoli) dbRistorante.tavoli = [];
        if(!dbRistorante.categorie) dbRistorante.categorie = [];
        if(!dbRistorante.prodotti) dbRistorante.prodotti = [];
      } else {
        dbRistorante = { sale: [], tavoli: [], categorie: [], prodotti: [] };
        salvaNelStorage();
      }
      aggiornaInterfaccia();
    }

    function salvaNelStorage() {
      localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(dbRistorante));
    }

    function aggiornaInterfaccia() {
      renderSale();
      renderTavoli();
      renderCategorie();
      renderProdotti();
    }

    function renderSale() {
      const lista = document.getElementById('lista-sale');
      const select = document.getElementById('select-sala');
      lista.innerHTML = '';
      select.innerHTML = '<option value="">-- Seleziona una Sala --</option>';
      dbRistorante.sale.forEach(s => {
        lista.innerHTML += `<li><span><i class="fa-solid fa-house-user"></i> ${s.nome}</span><button class="btn-del-item" onclick="eliminaVoce('sale', ${s.id})"><i class="fa-regular fa-trash-can"></i></button></li>`;
        select.innerHTML += `<option value="${s.id}">${s.nome}</option>`;
      });
    }

    function renderTavoli() {
      const lista = document.getElementById('lista-tavoli');
      lista.innerHTML = '';
      dbRistorante.tavoli.forEach(t => {
        const sala = dbRistorante.sale.find(s => s.id === t.salaId);
        const nomeSala = sala ? sala.nome : 'Sconosciuta';
        lista.innerHTML += `<li><span><strong>Tavolo ${t.numero}</strong> <small>(${nomeSala})</small></span><button class="btn-del-item" onclick="eliminaVoce('tavoli', ${t.id})"><i class="fa-regular fa-trash-can"></i></button></li>`;
      });
    }

    function renderCategorie() {
      const lista = document.getElementById('lista-categorie');
      const select = document.getElementById('select-categoria');
      lista.innerHTML = '';
      select.innerHTML = '<option value="">-- Seleziona una Categoria --</option>';
      dbRistorante.categorie.forEach(c => {
        lista.innerHTML += `<li><span><i class="fa-solid fa-tag"></i> ${c.nome}</span><button class="btn-del-item" onclick="eliminaVoce('categorie', ${c.id})"><i class="fa-regular fa-trash-can"></i></button></li>`;
        // CORREZIONE: Usiamo il nome o ID testuale per fare match con la cassa
        select.innerHTML += `<option value="${c.nome}">${c.nome}</option>`;
      });
    }

    function renderProdotti() {
      const lista = document.getElementById('lista-prodotti');
      lista.innerHTML = '';
      dbRistorante.prodotti.forEach(p => {
        lista.innerHTML += `<li><span><strong>${p.nome}</strong> - ${Number(p.prezzo).toFixed(2)} € <small>(${p.categoriaId})</small></span><button class="btn-del-item" onclick="eliminaVoce('prodotti', ${p.id})"><i class="fa-regular fa-trash-can"></i></button></li>`;
      });
    }

    function eliminaVoce(tipo, id) {
      if (confirm("Vuoi eliminare definitivamente questo elemento?")) {
        dbRistorante[tipo] = dbRistorante[tipo].filter(x => x.id !== id);
        salvaNelStorage();
        aggiornaInterfaccia();
      }
    }

    document.getElementById('form-sala').addEventListener('submit', function(e) {
      e.preventDefault();
      const nome = document.getElementById('nome-sala').value.trim();
      const nuovoId = dbRistorante.sale.length > 0 ? Math.max(...dbRistorante.sale.map(s => s.id)) + 1 : 1;
      dbRistorante.sale.push({ id: nuovoId, nome: nome });
      document.getElementById('nome-sala').value = '';
      salvaNelStorage();
      aggiornaInterfaccia();
    });

    document.getElementById('form-tavolo').addEventListener('submit', function(e) {
      e.preventDefault();
      const salaId = Number(document.getElementById('select-sala').value);
      const numero = document.getElementById('numero-tavolo').value.trim();
      const nuovoId = dbRistorante.tavoli.length > 0 ? Math.max(...dbRistorante.tavoli.map(t => t.id)) + 1 : 1;
      dbRistorante.tavoli.push({ id: nuovoId, numero: numero, salaId: salaId, stato: 'libero' });
      document.getElementById('numero-tavolo').value = '';
      salvaNelStorage();
      aggiornaInterfaccia();
    });

    document.getElementById('form-categoria').addEventListener('submit', function(e) {
      e.preventDefault();
      const nome = document.getElementById('nome-categoria').value.trim();
      const nuovoId = dbRistorante.categorie.length > 0 ? Math.max(...dbRistorante.categorie.map(c => c.id)) + 1 : 1;
      dbRistorante.categorie.push({ id: nuovoId, nome: nome });
      document.getElementById('nome-categoria').value = '';
      salvaNelStorage();
      aggiornaInterfaccia();
    });

    document.getElementById('form-prodotto').addEventListener('submit', function(e) {
      e.preventDefault();
      const categoriaNome = document.getElementById('select-categoria').value; 
      const nome = document.getElementById('nome-prodotto').value.trim();
      const prezzo = Number(document.getElementById('prezzo-prodotto').value);
      const nuovoId = dbRistorante.prodotti.length > 0 ? Math.max(...dbRistorante.prodotti.map(p => p.id)) + 1 : 1;

      dbRistorante.prodotti.push({ id: nuovoId, nome: nome, prezzo: prezzo, categoriaId: categoriaNome });
      document.getElementById('nome-prodotto').value = '';
      document.getElementById('prezzo-prodotto').value = '';
      salvaNelStorage();
      aggiornaInterfaccia();
    });

    window.addEventListener('DOMContentLoaded', inizializzaDatabaseLocale);
  </script>
</body>
</html>
