<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Tabella Tariffe</title>
  <link rel="stylesheet" href="../css/page.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
  <div class="header">
    <h2><i class="fa-solid fa-euro-sign" style="color:#00b894"></i> Tabella Tariffe</h2>
    <div class="toolbar">
      <button type="button" class="btn btn-secondary" id="btn-reload"><i class="fa-solid fa-rotate"></i> Ricarica</button>
      <button type="button" class="btn btn-primary" id="btn-nuovo"><i class="fa-solid fa-plus"></i> Nuovo</button>
    </div>
  </div>
  <div class="db-bar"><span><i class="fa-solid fa-database"></i> Base dati</span><div id="db-status" class="db-status idle">…</div></div>
  <div class="filters"><input type="search" id="search-input" placeholder="Cerca…"></div>
  <div class="table-scroll"><table><thead><tr><th>Tassa</th><th>Giornaliero</th><th>Settimanale</th><th>Quindicinale</th><th>Mensile</th><th>Azioni</th></tr></thead><tbody id="data-tbody"></tbody></table></div>
  <div id="empty-state" class="empty-state" style="display:none"><p>Nessun record.</p></div>
  <div class="modal-overlay" id="data-modal">
    <div class="modal">
      <div class="modal-header"><h3 id="modal-title">Nuovo</h3><button type="button" class="modal-close" id="modal-close">&times;</button></div>
      <form id="data-form"><div class="modal-body"><div class="form-grid"><div class="form-group"><label for="f-tassa">Tassa *</label><input type="text" id="f-tassa"></div>
            <div class="form-group"><label for="f-giornaliero">Giornaliero €</label><input type="number" id="f-giornaliero" step="0.01"></div>
            <div class="form-group"><label for="f-settimanale">Settimanale €</label><input type="number" id="f-settimanale" step="0.01"></div>
            <div class="form-group"><label for="f-quindicinale">Quindicinale €</label><input type="number" id="f-quindicinale" step="0.01"></div>
            <div class="form-group"><label for="f-mensile">Mensile €</label><input type="number" id="f-mensile" step="0.01"></div>
            <div class="form-group"><label for="f-listino">Listino ID</label><input type="number" id="f-listino"></div></div></div>
        <div class="modal-footer"><button type="button" class="btn btn-secondary" id="btn-cancel">Annulla</button><button type="submit" class="btn btn-primary" id="btn-save">Salva</button></div>
      </form>
    </div>
  </div>
  <script type="module" src="../js/tariffe.js"></script>
</body></html>
