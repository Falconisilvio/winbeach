<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Booking</title>
  <link rel="stylesheet" href="../css/page.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
  <div class="header">
    <h2><i class="fa-solid fa-calendar-days" style="color:#0084ff"></i> Booking</h2>
    <div class="toolbar">
      <button type="button" class="btn btn-secondary" id="btn-reload"><i class="fa-solid fa-rotate"></i> Ricarica</button>
      <button type="button" class="btn btn-primary" id="btn-nuovo"><i class="fa-solid fa-plus"></i> Nuova prenotazione</button>
    </div>
  </div>

  <p class="subtitle">Prenotazioni collegate a clienti e postazioni.</p>

  <div class="db-bar">
    <span><i class="fa-solid fa-database"></i> Base dati</span>
    <div id="db-status" class="db-status idle">Caricamento…</div>
  </div>

  <div class="stats-row">
    <div class="stat-box"><div class="num" id="stat-attive">0</div><div class="lbl">Prenotazioni attive</div></div>
    <div class="stat-box"><div class="num" id="stat-oggi">0</div><div class="lbl">Attive oggi</div></div>
    <div class="stat-box"><div class="num" id="stat-scadenza">0</div><div class="lbl">In scadenza oggi</div></div>
  </div>

  <div class="filters">
    <input type="search" id="search-input" placeholder="Cerca cliente o postazione…">
    <select id="filter-stato">
      <option value="">Tutti gli stati</option>
      <option value="confermata">Confermata</option>
      <option value="in_attesa">In attesa</option>
      <option value="cancellata">Cancellata</option>
    </select>
  </div>

  <div class="table-scroll">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Cliente</th>
          <th>Dal</th>
          <th>Al</th>
          <th>Postazione</th>
          <th>Importo</th>
          <th>Pagamento</th>
          <th>Stato</th>
          <th>Azioni</th>
        </tr>
      </thead>
      <tbody id="prenotazioni-tbody"></tbody>
    </table>
  </div>

  <div id="empty-state" class="empty-state" style="display:none">
    <i class="fa-solid fa-calendar-days" style="font-size:2rem;color:#ccc"></i>
    <p>Nessuna prenotazione. Aggiungi clienti e crea la prima prenotazione.</p>
  </div>

  <div class="modal-overlay" id="prenotazione-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">Nuova prenotazione</h3>
        <button type="button" class="modal-close" id="modal-close" aria-label="Chiudi">&times;</button>
      </div>
      <form id="prenotazione-form">
        <div class="modal-body">
          <div class="form-grid">
            <div class="form-group" style="grid-column:1/-1">
              <label for="f-cliente">Cliente *</label>
              <select id="f-cliente" required></select>
            </div>
            <div class="form-group" style="grid-column:1/-1">
              <label for="f-cella">Postazione</label>
              <select id="f-cella"></select>
            </div>
            <div class="form-group">
              <label for="f-inizio">Data inizio *</label>
              <input type="date" id="f-inizio" required>
            </div>
            <div class="form-group">
              <label for="f-fine">Data fine *</label>
              <input type="date" id="f-fine" required>
            </div>
            <div class="form-group">
              <label for="f-stato">Stato</label>
              <select id="f-stato"></select>
            </div>
            <div class="form-group">
              <label for="f-importo">Importo €</label>
              <input type="number" id="f-importo" step="0.01" min="0">
            </div>
            <div class="form-group">
              <label for="f-pagato">Pagato €</label>
              <input type="number" id="f-pagato" step="0.01" min="0">
            </div>
            <div class="form-group">
              <label for="f-canale">Canale</label>
              <select id="f-canale"><option value="offline">Offline</option><option value="widget">Widget</option><option value="portale">Portale</option></select>
            </div>
            <div class="form-group">
              <label for="f-pagamento">Stato pagamento</label>
              <select id="f-pagamento"><option value="da_saldare">Da saldare</option><option value="parziale">Parziale</option><option value="saldato">Saldato</option></select>
            </div>
            <div class="form-group">
              <label for="f-ora">Ora arrivo</label>
              <input type="time" id="f-ora">
            </div>
            <div class="form-group" style="grid-column:1/-1">
              <label for="f-note">Note</label>
              <textarea id="f-note" rows="2" placeholder="Richieste speciali, canale, ecc."></textarea>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" id="btn-cancel">Annulla</button>
          <button type="submit" class="btn btn-primary" id="btn-save">Salva</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="../js/booking.js"></script>
</body>
</html>
