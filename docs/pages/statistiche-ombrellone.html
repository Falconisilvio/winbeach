<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Statistiche per Ombrellone</title>
  <link rel="stylesheet" href="../css/page.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
  <div class="header">
    <h2><i class="fa-solid fa-chart-column" style="color:#0084ff"></i> Statistiche per Ombrellone</h2>
    
  </div>
  <div class="stats-row">
    <div class="stat-box"><div class="num">78%</div><div class="lbl">Occupazione media</div></div>
    <div class="stat-box"><div class="num">12</div><div class="lbl">Giorni medi</div></div>
    <div class="stat-box"><div class="num">€ 34</div><div class="lbl">Ricavo medio</div></div>
  </div>
  <div class="chart-placeholder"><i class="fa-solid fa-chart-line"></i><p>Grafico occupazione per singola postazione</p></div>
</body>
</html>
