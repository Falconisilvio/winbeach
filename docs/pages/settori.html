<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Tabella Settori</title>
  <link rel="stylesheet" href="../css/page.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
  <div class="header">
    <h2><i class="fa-solid fa-map" style="color:#6c5ce7"></i> Tabella Settori</h2>
    <div class="toolbar"><button class="btn btn-primary"><i class="fa-solid fa-plus"></i> Nuovo settore</button></div>
  </div>
  <table>
    <thead><tr><th>Settore</th><th>Nome</th><th>Postazioni</th><th>Tassa</th><th>Descrizione</th></tr></thead>
    <tbody><tr><td>A</td><td>Prima fila</td><td>40</td><td>Premium</td><td>Vista mare diretta</td></tr><tr><td>B</td><td>Centrale</td><td>60</td><td>Standard</td><td>Zona principale</td></tr><tr><td>C</td><td>Piscina</td><td>30</td><td>Economy</td><td>Vicino piscina</td></tr></tbody>
  </table>
</body>
</html>
