<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  
  <script src="../js/theme-init.js"></script>
  <script src="../js/lang-init.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Tabella Settori</title>
  <link rel="stylesheet" href="../css/page.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
  <div class="header">
    <h2><i class="fa-solid fa-map" style="color:#6c5ce7"></i> Tabella Settori</h2>
    <div class="toolbar">
      <button type="button" class="btn btn-secondary" id="btn-reload"><i class="fa-solid fa-rotate"></i> Ricarica</button>
      <button type="button" class="btn btn-primary" id="btn-nuovo"><i class="fa-solid fa-plus"></i> Nuovo</button>
    </div>
  </div>
  <div class="db-bar"><span><i class="fa-solid fa-database"></i> Base dati</span><div id="db-status" class="db-status idle">…</div></div>
  <div class="filters"><input type="search" id="search-input" placeholder="Cerca…"></div>
  <div class="table-scroll"><table><thead><tr><th>Codice</th><th>Nome</th><th>Postazioni</th><th>Tassa</th><th>Descrizione</th><th>Azioni</th></tr></thead><tbody id="data-tbody"></tbody></table></div>
  <div id="empty-state" class="empty-state" style="display:none"><p>Nessun record.</p></div>
  <div class="modal-overlay" id="data-modal">
    <div class="modal">
      <div class="modal-header"><h3 id="modal-title">Nuovo</h3><button type="button" class="modal-close" id="modal-close">&times;</button></div>
      <form id="data-form"><div class="modal-body"><div class="form-grid"><div class="form-group"><label for="f-codice">Codice *</label><input type="text" id="f-codice"></div>
            <div class="form-group"><label for="f-nome">Nome *</label><input type="text" id="f-nome"></div>
            <div class="form-group"><label for="f-postazioni">Postazioni</label><input type="number" id="f-postazioni"></div>
            <div class="form-group"><label for="f-tassa">Tassa</label><input type="text" id="f-tassa"></div>
            <div class="form-group" style="grid-column:1/-1"><label for="f-descrizione">Descrizione</label><input type="text" id="f-descrizione"></div>
            <div class="form-group"><label><input type="checkbox" id="f-attivo"> Attivo</label></div></div></div>
        <div class="modal-footer"><button type="button" class="btn btn-secondary" id="btn-cancel">Annulla</button><button type="submit" class="btn btn-primary" id="btn-save">Salva</button></div>
      </form>
    </div>
  </div>
  <script type="module" src="../js/settori.js"></script>
</body></html>
