<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Gestione Utenti</title>
  <link rel="stylesheet" href="../css/page.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
  <div class="header">
    <h2><i class="fa-solid fa-user-gear" style="color:#8e44ad"></i> Gestione Utenti</h2>
    <div class="toolbar">
      <button type="button" class="btn btn-secondary" id="btn-reload"><i class="fa-solid fa-rotate"></i> Ricarica</button>
      <button type="button" class="btn btn-primary" id="btn-nuovo"><i class="fa-solid fa-plus"></i> Nuovo</button>
    </div>
  </div>
  <div class="db-bar"><span><i class="fa-solid fa-database"></i> Base dati</span><div id="db-status" class="db-status idle">…</div></div>
  <div class="filters"><input type="search" id="search-input" placeholder="Cerca…"></div>
  <div class="table-scroll"><table><thead><tr><th>Utente</th><th>Ruolo</th><th>Email</th><th>Stato</th><th>Azioni</th></tr></thead><tbody id="data-tbody"></tbody></table></div>
  <div id="empty-state" class="empty-state" style="display:none"><p>Nessun record.</p></div>
  <div class="modal-overlay" id="data-modal">
    <div class="modal">
      <div class="modal-header"><h3 id="modal-title">Nuovo</h3><button type="button" class="modal-close" id="modal-close">&times;</button></div>
      <form id="data-form"><div class="modal-body"><div class="form-grid"><div class="form-group"><label for="f-username">Username *</label><input type="text" id="f-username"></div>
            <div class="form-group"><label for="f-email">Email</label><input type="text" id="f-email"></div>
            <div class="form-group"><label for="f-ruolo">Ruolo</label><input type="text" id="f-ruolo"></div>
            <div class="form-group"><label><input type="checkbox" id="f-attivo"> Attivo</label></div></div></div>
        <div class="modal-footer"><button type="button" class="btn btn-secondary" id="btn-cancel">Annulla</button><button type="submit" class="btn btn-primary" id="btn-save">Salva</button></div>
      </form>
    </div>
  </div>
  <script type="module" src="../js/utenti.js"></script>
</body></html>
