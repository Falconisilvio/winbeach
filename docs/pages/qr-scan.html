<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>QR Scan</title>
  <link rel="stylesheet" href="../css/page.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
  <div class="header">
    <h2><i class="fa-solid fa-qrcode" style="color:#0084ff"></i> QR Scan / Ricerca rapida</h2>
  </div>
  <div class="db-bar"><span><i class="fa-solid fa-database"></i> Base dati</span><div id="db-status" class="db-status idle">…</div></div>

  <div class="qr-zone">
    <i class="fa-solid fa-qrcode"></i>
    <p>Cerca per ID prenotazione, numero postazione o nome cliente</p>
    <input type="text" id="qr-input" placeholder="es. 12 o Mario Rossi" style="padding:12px;width:100%;max-width:320px;margin:12px 0">
    <div class="qr-actions">
      <button type="button" class="btn btn-primary" id="btn-search">Cerca</button>
      <button type="button" class="btn btn-secondary" id="btn-camera"><i class="fa-solid fa-camera"></i> Camera</button>
      <button type="button" class="btn btn-secondary" id="btn-stop-camera" style="display:none"><i class="fa-solid fa-stop"></i> Stop</button>
    </div>
  </div>

  <div id="qr-reader-wrap" class="qr-reader-wrap" hidden>
    <div id="qr-reader"></div>
  </div>

  <div id="qr-result" style="margin-top:20px"></div>

  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script type="module" src="../js/qr-scan.js"></script>
</body>
</html>
