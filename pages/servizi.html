<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Gestione Servizi</title>
  <link rel="stylesheet" href="../css/page.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
  <div class="header">
    <h2><i class="fa-solid fa-bell-concierge" style="color:#e67e22"></i> Servizi Extra</h2>
    <div class="toolbar">
      <button class="btn btn-warning"><i class="fa-solid fa-plus"></i> Nuovo servizio</button>
    </div>
  </div>
  <div class="grid-cards">
    <div class="card-item"><i class="fa-solid fa-hot-tub-person" style="color:#e67e22"></i><h3>Ingresso SPA</h3><div class="value">15,00 € <small>/giorno</small></div></div>
    <div class="card-item"><i class="fa-solid fa-sailboat" style="color:#3498db"></i><h3>Noleggio Pedalò</h3><div class="value">10,00 € <small>/ora</small></div></div>
    <div class="card-item"><i class="fa-solid fa-wifi" style="color:#9b59b6"></i><h3>Wi-Fi Premium</h3><div class="value">5,00 € <small>/settimana</small></div></div>
    <div class="card-item"><i class="fa-solid fa-martini-glass" style="color:#e74c3c"></i><h3>Servizio bar</h3><div class="value">A consumo</div></div>
  </div>
</body>
</html>
