<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Statistiche per Durata</title>
  <link rel="stylesheet" href="../css/page.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
  <div class="header">
    <h2><i class="fa-solid fa-clock" style="color:#00b894"></i> Statistiche per Durata</h2>
    
  </div>
  <div class="stats-row">
    <div class="stat-box"><div class="num">3,2</div><div class="lbl">Giorni medi</div></div>
    <div class="stat-box"><div class="num">45%</div><div class="lbl">Prenotazioni 7+ giorni</div></div>
    <div class="stat-box"><div class="num">28%</div><div class="lbl">Giornalieri</div></div>
  </div>
  <div class="chart-placeholder"><i class="fa-solid fa-chart-line"></i><p>Distribuzione durata soggiorni</p></div>
</body>
</html>
